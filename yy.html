
<!DOCTYPE html>
<html lang="zh-cn">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>个人主页</title>
	<style>
		body {
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			background: linear-gradient(120deg, #f0f4f8 0%, #e0e7ef 100%);
			margin: 0;
			padding: 0;
		}
		.container {
			max-width: 400px;
			margin: 60px auto;
			background: #fff;
			border-radius: 16px;
			box-shadow: 0 4px 24px rgba(0,0,0,0.08);
			padding: 32px 24px;
			text-align: center;
		}
		.avatar {
			width: 100px;
			height: 100px;
			border-radius: 50%;
			object-fit: cover;
			margin-bottom: 16px;
			border: 3px solid #e0e7ef;
		}
		h1 {
			margin: 0 0 8px 0;
			font-size: 2em;
			color: #333;
		}
		p {
			color: #666;
			margin: 8px 0 16px 0;
		}
		.contact {
			margin-top: 20px;
		}
		.contact a {
			color: #4a90e2;
			text-decoration: none;
			margin: 0 8px;
			font-size: 1.1em;
		}
		.contact a:hover {
			text-decoration: underline;
		}
	</style>
</head>
<body>
	<div class="container">
		<img src="https://avatars.githubusercontent.com/u/1?v=4" alt="头像" class="avatar">
		<h1>你的名字</h1>
		<p>这里是一段简短的自我介绍。你可以写上你的职业、兴趣或一句座右铭。dctufggy方法vedrftgfghbgtg</p>
		<div class="contact">
			<a href="mailto:your@email.com">邮箱</a>
			<a href="https://github.com/yourname" target="_blank">GitHub</a>
			<a href="https://yourwebsite.com" target="_blank">个人网站</a>
		</div>
	</div>
</body>
</html>
